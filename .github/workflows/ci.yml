name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript types + unit tests ────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspaces --if-present

  # ── Rust + WASM build ────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install Node.js dependencies
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Use the npm script so wasm-pack outputs to {repo-root}/pkg/ (the path
      # the TypeScript wasm-loader.ts expects: '../../../pkg/microvecdb_wasm.js').
      - name: Build WASM + TypeScript
        run: npm run build --workspace=packages/core

      - name: Type-check (packages/core)
        run: npm run typecheck --workspace=packages/core

      - name: Verify dist/ artefacts exist
        run: |
          test -f packages/core/dist/index.js
          test -f packages/core/dist/index.d.ts
          test -f packages/core/dist/worker.js
          test -f packages/core/dist/vercel.js
          test -f packages/core/dist/vercel.d.ts
          echo "✅ All expected artefacts present"

      - name: Upload dist/ for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: packages/core/dist
          retention-days: 1

  # ── Lint examples (no errors, no unused vars) ────────────────────────────
  lint-examples:
    name: Lint examples
    runs-on: ubuntu-latest
    needs: [build-wasm]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download @microvecdb/core dist
        uses: actions/download-artifact@v4
        with:
          name: core-dist
          path: packages/core/dist

      - name: Type-check pdf-brain
        working-directory: examples/pdf-brain
        run: npx tsc --noEmit

      - name: Type-check visual-search
        working-directory: examples/visual-search
        run: npx tsc --noEmit
