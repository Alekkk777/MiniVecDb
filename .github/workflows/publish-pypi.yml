name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for OIDC Trusted Publisher

jobs:
  # ── Build abi3 wheels (one per platform, works with Python 3.9+) ─────────
  build-wheels:
    name: Build wheel — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/microvecdb-python
          command: build
          args: --release --out dist
          # abi3 feature is set in Cargo.toml (pyo3/abi3-py39).
          # manylinux=auto gives broad Linux compatibility via musllinux fallback.
          manylinux: auto

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: crates/microvecdb-python/dist

  # ── Build source distribution ────────────────────────────────────────────
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/microvecdb-python
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/microvecdb-python/dist

  # ── Publish to PyPI via OIDC Trusted Publisher ───────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: pypi

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
