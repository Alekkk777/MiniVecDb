name: Bug Report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
        The more detail you provide, the faster we can fix it.

  - type: input
    id: version
    attributes:
      label: "@microvecdb/core version"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Edge
        - Node.js (not a browser)
        - Other
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser / Node.js version
      placeholder: "Chrome 124, Safari 17.4, Node 20.11…"
    validations:
      required: true

  - type: dropdown
    id: bundler
    attributes:
      label: Bundler
      options:
        - Vite
        - webpack 5
        - Rollup
        - esbuild
        - None (vanilla script tag)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        The smallest possible code that triggers the bug.
        A CodeSandbox / StackBlitz link is ideal.
      render: typescript
      placeholder: |
        import { MicroVecDB } from '@microvecdb/core';

        const db = await MicroVecDB.init({ capacity: 100 });
        db.insert({ id: 1, vector: new Float32Array(384).fill(1) });
        // crashes here ↓
        const results = db.search(new Float32Array(384).fill(1), { limit: 1 });
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour (error message / console output)
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help (screenshots, network tab, etc.)
